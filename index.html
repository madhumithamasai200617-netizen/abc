<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advance Birthday Wishes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎉 Advance Birthday Wishes</h1>

    <input type="text" id="name" placeholder="Birthday Person Name">

  </div>

  <script src="script.js"></script>
</body>
</html>
