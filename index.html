<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advance Birthday Wishes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1 class="title">🎂 Advance Birthday Wishes</h1>

  <input type="text" id="name" placeholder="Birthday Person Name">
  <textarea id="wish" placeholder="Write your birthday wish..."></textarea>
  <input type="date" id="date">

  <button onclick="saveWish()">Save Wish</button>

  <div id="countdown"></div>
  <h2 id="result"></h2>
</div>

<div class="confetti"></div>

<script src="script.js"></script>
</body>
</html>
